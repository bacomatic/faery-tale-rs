# Compass rose bitmaps from fsubs.asm (_hinor, _hivar).
# These are single-bitplane images (plane 2 of the text viewport).
# drawcompass() blits hinor first (base), then overlays the active
# direction region from hivar using comptable[].
# Original source bitmap: InitBitMap(bm_source, 3, 64, 24) — stride 8 bytes/row.
# Only the leftmost 48 pixels (6 bytes) are used; 2 padding bytes per row skipped.

[compass]

[compass.comptable]
# { xrect, yrect, xsize, ysize } per direction index 0-9.
# Pixel regions within the 48x24 compass area.
# Dir 8 and 9 are "standing still" — 1x1 no-op blit.
regions = [
    { x = 0,  y = 0,  w = 16, h = 8 },   # 0  SW
    { x = 16, y = 0,  w = 16, h = 9 },   # 1  S
    { x = 32, y = 0,  w = 16, h = 8 },   # 2  SE
    { x = 30, y = 8,  w = 18, h = 8 },   # 3  E
    { x = 32, y = 16, w = 16, h = 8 },   # 4  NE
    { x = 16, y = 13, w = 16, h = 11 },  # 5  N
    { x = 0,  y = 16, w = 16, h = 8 },   # 6  NW
    { x = 0,  y = 8,  w = 18, h = 8 },   # 7  W
    { x = 0,  y = 0,  w = 1,  h = 1 },   # 8  still
    { x = 0,  y = 0,  w = 1,  h = 1 },   # 9  still
]

