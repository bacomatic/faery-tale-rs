version = 1

[rag]
ollama_url = "http://127.0.0.1:11434"
embed_model = "nomic-embed-text"
llm_model = "llama3.2"

index_root = "."
index_db = ".rag/index.sqlite"
index_ext = "rs,md,toml"
index_chunk_lines = 40
index_overlap_lines = 8
index_reset = true
index_incremental = false

only_ext = "rs"
ask_top_k = 5
ask_max_context_chars = 8000
ask_show_sources = true
ask_code_first = true
ask_confidence_fallback = true
ask_min_source_score = 0.70
